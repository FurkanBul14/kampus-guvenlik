version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: campus_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: campus_safety
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/campus_safety
      - JWT_SECRET=change-this-in-production-!!
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus_frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend

volumes:
  mongo_data:
    driver: local
